version: "3.9"

services:
  house-price-api:
    build: .
    container_name: house_price_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models      # persist trained model outside container
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
